name: Build SPFx Package for Weekly Shift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build SPFx App in Docker
        run: |
          # Use the official Microsoft PnP Docker container to bypass node-sass/node-gyp issues
          docker run --rm \
            -v ${{ github.workspace }}:/usr/app/spfx \
            -w /usr/app/spfx \
            m365pnp/spfx:1.11.0 \
            sh -c "npm install && gulp bundle --ship && gulp package-solution --ship"

      - name: Upload .sppkg Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyShiftApp-Package
          path: sharepoint/solution/*.sppkg
