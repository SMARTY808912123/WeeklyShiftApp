name: Build SPFx Package for Weekly Shift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      npm_config_python: python3
      PYTHON: python3
      npm_config_build_from_source: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v14
        uses: actions/setup-node@v4
        with:
          node-version: '14.21.3'

      - name: Setup Python 3 for node-gyp
        run: |
          python3 -V
          node --version
          npm config set python python3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install PnPjs
        run: npm install @pnp/sp @pnp/graph @pnp/logging --legacy-peer-deps

      - name: Build SPFx Web Part
        run: npx gulp bundle --ship

      - name: Package SPFx Solution
        run: npx gulp package-solution --ship

      - name: Upload .sppkg Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyShiftApp-Package
          path: sharepoint/solution/*.sppkg
