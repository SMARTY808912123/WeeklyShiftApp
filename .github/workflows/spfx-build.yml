name: Build SPFx Package for Weekly Shift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: '16.20.2'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install PnPjs
        run: npm install @pnp/sp @pnp/graph @pnp/logging --legacy-peer-deps

      - name: Patch node-sass to sass
        run: |
          npm install sass --legacy-peer-deps
          npm uninstall node-sass --legacy-peer-deps || true

      - name: Build SPFx Web Part
        run: npx gulp bundle --ship

      - name: Package SPFx Solution
        run: npx gulp package-solution --ship

      - name: Upload .sppkg Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyShiftApp-Package
          path: sharepoint/solution/*.sppkg
