name: Build SPFx Package for Weekly Shift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v14 (SPFx compatible)
        uses: actions/setup-node@v4
        with:
          node-version: '14.21.3'

      - name: Install Python 2 (needed for node-sass/gyp)
        run: |
          sudo apt-get update
          sudo apt-get install -y python2
          npm config set python python2

      - name: Install Dependencies
        run: npm install

      - name: Install PnPjs
        run: npm install @pnp/sp @pnp/graph @pnp/logging

      - name: Build SPFx Web Part
        run: npx gulp bundle --ship

      - name: Package SPFx Solution
        run: npx gulp package-solution --ship

      - name: Upload .sppkg Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyShiftApp-Package
          path: sharepoint/solution/*.sppkg
